services:
  postgres:
    image: postgres:16-alpine
    container_name: codebank-postgres
    environment:
      POSTGRES_DB: codebank
      POSTGRES_USER: codebank
      POSTGRES_PASSWORD: codebank
    ports:
      - "5432:5432"
    volumes:
      - pgdata:/var/lib/postgresql/data
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U codebank -d codebank"]
      interval: 10s
      timeout: 5s
      retries: 5

  adminer:
    image: adminer:latest
    container_name: codebank-adminer
    ports:
      - "8081:8080"
    depends_on:
      postgres:
        condition: service_healthy

volumes:
  pgdata:
